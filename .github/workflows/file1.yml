name: First Run
on: push
jobs:
    Code-Checkout:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOKCER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build Image
              run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:4.0 .

            - name: Push Image To DockerHUb
              run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:4.0

            - name: Create Image Using The New Image
              run: docker run -d --name portfolio-app-4.0 -p 8091:80 thejoker91/portfolio-app:4.0