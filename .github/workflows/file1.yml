name: First Run
on: push
jobs:
    Code-Checkout:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build Image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app1:${{ github.run_number }} .
                docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app1 .

            - name: Push Image To DockerHUb
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app1:${{ github.run_number }}
                docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app1



    Code-Deploy:
        needs: Code-Checkout
        runs-on: ubuntu-latest
        steps:
            - name: Execute remote SSH commands using SSH key
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.SSH_HOST }}
                username: ${{ secrets.SSH_USERNAME }}
                key: ${{ secrets.SSH_KEY }}
                # port: ${{ secrets.PORT }}
                script: |
                    docker rm -f portfolio-app1 || echo "No such container found. Skipping removal..."
                    docker run -d --name portfolio-app1 -p 8082:80 ${{ secrets.DOCKER_USERNAME }}/portfolio-app1
